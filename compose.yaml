services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 9000:80
    environment:
      - GEM_API_KEY=${GEM_API_KEY}
    volumes:
      - ./src:/var/www/html

  mariadb:
    image: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: maria
      MARIABD_DATABASE: ERASMUS
    ports:
      - "6033:3306"
    volumes:
      - dbdata:/var/lib/mariadb
      - ./ERASMUS.sql:/docker-entrypoint-initdb.d/init.sql
  
  phpmyadmin:
    image: phpmyadmin
    links:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    restart: always
    ports:
      - 8081:80

volumes:
  dbdata: